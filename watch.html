<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও দেখুন - NatoHub BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --accent: #ff3b3b;
            --text: #ffffff;
            --muted: #888;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Baloo Da 2', cursive;
            min-height: 100vh;
        }

        .header {
            background: #111;
            border-bottom: 2px solid var(--accent);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 14px;
            border-radius: 8px;
            font-family: 'Baloo Da 2', cursive;
            font-size: 13px;
            cursor: pointer;
        }
        .header-title {
            font-size: 15px;
            font-weight: 700;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container { padding: 16px; max-width: 480px; margin: 0 auto; }

        /* AD SECTION */
        #adSection { animation: fadeIn 0.4s ease; }

        .ad-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }

        .timer-circle {
            width: 90px;
            height: 90px;
            position: relative;
        }
        .timer-circle svg { transform: rotate(-90deg); }
        .timer-circle circle { fill: none; stroke: var(--border); stroke-width: 6; }
        .timer-circle .prog { stroke: var(--accent); stroke-dasharray: 251; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; stroke-linecap: round; }
        .timer-num {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
        }
        .timer-text { font-size: 13px; color: var(--muted); }

        .ad-placeholder {
            background: #111;
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 18px;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 16px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }

        .watch-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Baloo Da 2', cursive;
            font-size: 16px;
            font-weight: 700;
            cursor: not-allowed;
            opacity: 0.4;
            transition: all 0.3s;
            width: 100%;
        }
        .watch-btn.ready {
            cursor: pointer;
            opacity: 1;
            animation: pulse 1.5s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,59,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255,59,59,0); }
        }

        /* VIDEO SECTION */
        #videoSection { display: none; animation: fadeIn 0.5s ease; }

        .video-title-bar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
        }
        .video-wrap {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
            aspect-ratio: 16/9;
            margin-bottom: 12px;
        }
        .video-wrap iframe { width: 100%; height: 100%; border: none; }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .action-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 10px;
            font-family: 'Baloo Da 2', cursive;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .action-btn:hover { border-color: var(--accent); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href='index.html'">← ফিরুন</button>
    <div class="header-title" id="headerTitle">NatoHub BD</div>
</div>

<div class="container">

    <!-- AD -->
    <div id="adSection">
        <div class="ad-card">
            <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">ভিডিও শুরু হচ্ছে...</div>

            <div class="timer-wrap">
                <div class="timer-circle">
                    <svg viewBox="0 0 90 90" width="90" height="90">
                        <circle cx="45" cy="45" r="40"/>
                        <circle class="prog" cx="45" cy="45" r="40" id="progCircle"/>
                    </svg>
                    <div class="timer-num" id="timerNum">15</div>
                </div>
                <div class="timer-text">সেকেন্ড পর ভিডিও শুরু হবে</div>
            </div>

            <!-- Monetag Ad -->
            <script src='//libtl.com/sdk.js' data-zone='10924924' data-sdk='show_10924924'></script>

            <button class="watch-btn" id="watchBtn" onclick="showVideo()">
                ⏳ অপেক্ষা করুন...
            </button>
        </div>
    </div>

    <!-- VIDEO -->
    <div id="videoSection">
        <div class="video-title-bar" id="videoTitle">🎬</div>
        <div class="video-wrap">
            <iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="action-row">
            <button class="action-btn" onclick="window.location.href='index.html'">📋 আরো ভিডিও</button>
            <button class="action-btn" onclick="shareVideo()">📤 Share</button>
        </div>
    </div>
</div>

<script>
    const ytUrl = localStorage.getItem('watchUrl') || '';
    const title = localStorage.getItem('watchTitle') || 'ভিডিও';

    document.getElementById('headerTitle').textContent = title;

    function getYTId(url) {
        const m = url.match(/[?&]v=([^&]+)/);
        return m ? m[1] : null;
    }

    // Timer
    let secs = 15;
    const total = 251;
    const circle = document.getElementById('progCircle');
    const btn = document.getElementById('watchBtn');

    const timer = setInterval(() => {
        secs--;
        document.getElementById('timerNum').textContent = secs;
        circle.style.strokeDashoffset = total - (total * secs / 15);

        if (secs <= 0) {
            clearInterval(timer);
            btn.classList.add('ready');
            btn.textContent = '▶ ভিডিও দেখুন';
        }
    }, 1000);

    function showVideo() {
        if (secs > 0) return;
        document.getElementById('adSection').style.display = 'none';
        const vs = document.getElementById('videoSection');
        vs.style.display = 'block';
        document.getElementById('videoTitle').textContent = '🎬 ' + title;
        const ytId = getYTId(ytUrl);
        if (ytId) {
            document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
        }
    }

    function shareVideo() {
        if (navigator.share) {
            navigator.share({ title: title, url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('লিঙ্ক কপি হয়েছে!');
        }
    }
</script>
</body>
</html>
