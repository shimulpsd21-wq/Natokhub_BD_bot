<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatoHub BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --accent: #ff3b3b;
            --text: #ffffff;
            --muted: #888;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Baloo Da 2', cursive;
            min-height: 100vh;
        }
        .header {
            background: #111;
            border-bottom: 2px solid var(--accent);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon {
            background: var(--accent);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
        }
        .logo-text { font-size: 18px; font-weight: 800; color: white; }
        .logo-text span { color: var(--accent); }
        .search-wrap { padding: 14px 16px; background: #111; }
        .search-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Baloo Da 2', cursive;
            font-size: 14px;
            flex: 1;
        }
        .search-box input::placeholder { color: var(--muted); }
        .tabs {
            display: flex;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            background: #111;
        }
        .tab {
            background: none;
            border: none;
            color: var(--muted);
            padding: 10px 18px;
            font-family: 'Baloo Da 2', cursive;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .container { padding: 16px; }
        .section-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
        }
        .series-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .series-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .series-header:hover { background: #222; }
        .series-thumb {
            width: 70px;
            height: 50px;
            border-radius: 8px;
            background: #333;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
        }
        .series-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .series-info { flex: 1; }
        .series-name { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
        .series-meta { font-size: 12px; color: var(--muted); }
        .series-arrow { color: var(--muted); font-size: 12px; transition: transform 0.3s; }
        .series-arrow.open { transform: rotate(180deg); }
        .episodes { display: none; border-top: 1px solid var(--border); }
        .episodes.open { display: block; }
        .episode-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        .episode-item:last-child { border-bottom: none; }
        .episode-item:hover { background: #222; }
        .ep-thumb {
            width: 90px;
            min-width: 90px;
            height: 56px;
            border-radius: 8px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .ep-play {
            position: absolute;
            background: rgba(255,59,59,0.9);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        .ep-num {
            position: absolute;
            bottom: 3px;
            left: 3px;
            background: var(--accent);
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 1px 5px;
            border-radius: 4px;
        }
        .ep-info { flex: 1; }
        .ep-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
        .ep-meta { font-size: 11px; color: var(--muted); }
        .video-grid { display: flex; flex-direction: column; gap: 10px; }
        .video-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            gap: 10px;
            padding: 10px;
            transition: all 0.2s;
            animation: fadeUp 0.4s ease both;
        }
        .video-card:hover { border-color: var(--accent); background: #1f1f1f; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .v-thumb {
            width: 100px;
            min-width: 100px;
            height: 64px;
            border-radius: 8px;
            background: #222;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-play {
            position: absolute;
            background: rgba(255,59,59,0.9);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
        .v-duration {
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: rgba(0,0,0,0.85);
            color: white;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        .v-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .v-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
        .v-meta { font-size: 11px; color: var(--muted); }
        .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
    </style>
</head>
<body>
 
<div class="header">
    <div class="logo">
        <div class="logo-icon">N</div>
        <div class="logo-text">Nato<span>Hub</span> BD</div>
    </div>
    <span style="font-size:20px;">🎬</span>
</div>
 
<div class="search-wrap">
    <div class="search-box">
        <span>🔍</span>
        <input type="text" placeholder="সার্চ করুন..." id="searchInput" oninput="renderAll()">
    </div>
</div>
 
<div class="tabs">
    <button class="tab active" onclick="setTab('all', this)">ALL</button>
    <button class="tab" onclick="setTab('natok', this)">NATOK</button>
    <button class="tab" onclick="setTab('music', this)">MUSIC</button>
    <button class="tab" onclick="setTab('funny', this)">FUNNY</button>
</div>
 
<div class="container" id="mainContainer"></div>
 
<!-- ✅ videos.js থেকে সব data আসে — ওই file এ গিয়ে link add করুন -->
<script src="videos.js"></script>
<script>
function getYTId(url) {
    if (!url) return null;
    const short = url.match(/youtu\.be\/([^?&]+)/);
    if (short) return short[1];
    const m = url.match(/[?&]v=([^&]+)/);
    return m ? m[1] : null;
}
function getThumb(ytId) {
    return ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : null;
}
 
let currentTab = 'all';
let openSeries = {};
 
function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
}
 
function toggleSeries(id) {
    openSeries[id] = !openSeries[id];
    renderAll();
}
 
function goWatch(youtubeUrl, title) {
    if (!youtubeUrl || youtubeUrl.includes('YOUTUBE_ID_HERE')) {
        alert('ভিডিও link এখনো add করা হয়নি!');
        return;
    }
    localStorage.setItem('watchUrl', youtubeUrl);
    localStorage.setItem('watchTitle', title);
    window.location.href = 'watch.html';
}
 
function renderAll() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('mainContainer');
    let html = '';
 
    const filteredSeries = series.filter(s => {
        if (currentTab !== 'all' && s.category !== currentTab) return false;
        if (q && !s.name.toLowerCase().includes(q)) return false;
        return true;
    });
 
    const filteredVideos = videos.filter(v => {
        if (currentTab !== 'all' && v.category !== currentTab) return false;
        if (q && !v.title.toLowerCase().includes(q)) return false;
        return true;
    });
 
    if (filteredSeries.length > 0) {
        html += `<div class="section-title">নাটক / সিরিজ</div>`;
        filteredSeries.forEach(s => {
            const isOpen = openSeries[s.id];
            const thumbId = s.thumb || (s.episodes[0] ? getYTId(s.episodes[0].youtube) : null);
            const thumbUrl = getThumb(thumbId);
            html += `
            <div class="series-card">
                <div class="series-header" onclick="toggleSeries('${s.id}')">
                    <div class="series-thumb">
                        ${thumbUrl ? `<img src="${thumbUrl}" onerror="this.style.display='none'">` : '🎬'}
                    </div>
                    <div class="series-info">
                        <div class="series-name">${s.name}</div>
                        <div class="series-meta">${s.episodes.length} এপিসোড</div>
                    </div>
                    <div class="series-arrow ${isOpen ? 'open' : ''}">▼</div>
                </div>
                <div class="episodes ${isOpen ? 'open' : ''}">
                    ${s.episodes.map(ep => {
                        const ytId = getYTId(ep.youtube);
                        const thumb = getThumb(ytId);
                        return `
                        <div class="episode-item" onclick="goWatch('${ep.youtube}', '${s.name} - ${ep.title}')">
                            <div class="ep-thumb">
                                ${thumb ? `<img src="${thumb}" onerror="this.parentElement.innerHTML='🎬'">` : '🎬'}
                                <div class="ep-play">▶</div>
                                <div class="ep-num">EP ${ep.ep}</div>
                            </div>
                            <div class="ep-info">
                                <div class="ep-title">${s.name}</div>
                                <div class="ep-meta">${ep.title}</div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        });
    }
 
    if (filteredVideos.length > 0) {
        html += `<div class="section-title" style="margin-top:16px">ভিডিও</div>`;
        html += `<div class="video-grid">`;
        filteredVideos.forEach((v, i) => {
            const ytId = getYTId(v.youtube);
            const thumb = getThumb(ytId);
            html += `
            <div class="video-card" onclick="goWatch('${v.youtube}', '${v.title}')" style="animation-delay:${i*0.08}s">
                <div class="v-thumb">
                    ${thumb ? `<img src="${thumb}">` : v.emoji || '🎬'}
                    <div class="v-play">▶</div>
                    ${v.duration ? `<div class="v-duration">${v.duration}</div>` : ''}
                </div>
                <div class="v-info">
                    <div class="v-title">${v.title}</div>
                    <div class="v-meta">👁 ${v.views || ''}</div>
                </div>
            </div>`;
        });
        html += `</div>`;
    }
 
    if (filteredSeries.length === 0 && filteredVideos.length === 0) {
        html = `<div class="empty">কোনো ভিডিও পাওয়া যায়নি 😔</div>`;
    }
 
    container.innerHTML = html;
}
 
renderAll();
</script>
</body>
</html>
